# DEV — small + fast, but now with repetitions for reliability.
mode: dev
max_tokens: 64
reps: 3                      # each timing is the mean of 3 runs (+ std recorded)
target_for_detail: "Qwen2.5-3B"

models:
  - { label: "Qwen2.5-3B",  model: mlx-community/Qwen2.5-3B-Instruct-4bit,  draft: mlx-community/Qwen2.5-0.5B-Instruct-4bit, draft_name: "Qwen 0.5B", params_b: 3 }
  - { label: "Llama-3.2-3B", model: mlx-community/Llama-3.2-3B-Instruct-4bit, draft: mlx-community/Llama-3.2-1B-Instruct-4bit, draft_name: "Llama 1B", params_b: 3 }
  - { label: "Qwen2.5-1.5B", model: mlx-community/Qwen2.5-1.5B-Instruct-4bit, draft: mlx-community/Qwen2.5-0.5B-Instruct-4bit, draft_name: "Qwen 0.5B", params_b: 1.5 }

spec:
  k_sweep: [2, 4]
  drafts_for_detail:
    - { name: "0.5B", model: mlx-community/Qwen2.5-0.5B-Instruct-4bit }
    - { name: "1.5B", model: mlx-community/Qwen2.5-1.5B-Instruct-4bit }

batch:
  max_tokens: 32
  sizes: [1, 4, 8]

combos:
  models:
    - { label: "Qwen2.5-3B",  bf16: mlx-community/Qwen2.5-3B-Instruct-bf16,   int4: mlx-community/Qwen2.5-3B-Instruct-4bit,   draft: mlx-community/Qwen2.5-0.5B-Instruct-4bit }
    - { label: "Llama-3.2-3B", bf16: mlx-community/Llama-3.2-3B-Instruct-bf16, int4: mlx-community/Llama-3.2-3B-Instruct-4bit, draft: mlx-community/Llama-3.2-1B-Instruct-4bit }
    - { label: "Qwen2.5-1.5B", bf16: mlx-community/Qwen2.5-1.5B-Instruct-bf16, int4: mlx-community/Qwen2.5-1.5B-Instruct-4bit, draft: mlx-community/Qwen2.5-0.5B-Instruct-4bit }
  stacks:
    - { precision: bf16, kv: "off", spec: false, label: "No optimization (bf16)" }
    - { precision: int4, kv: "off", spec: false, label: "Quantized to 4-bit" }
    - { precision: int4, kv: 4,   spec: false, label: "+ KV-cache quant" }
    - { precision: int4, kv: "off", spec: true,  label: "+ Speculative" }
    - { precision: int4, kv: 4,   spec: true,  label: "+ KV + Speculative (all)" }

kv:
  contexts_tokens: [2000, 4000, 8000, 16000, 32000]   # analytical cache sizes
  fidelity_repeat: 100                                 # ~2k-token prompt for the fidelity test

# quantization per model — bf16 vs 4-bit speed/memory/perplexity (8-bit added in full)
quant:
  models:
    - { label: "Qwen2.5-3B",  bf16: mlx-community/Qwen2.5-3B-Instruct-bf16,  int4: mlx-community/Qwen2.5-3B-Instruct-4bit }
    - { label: "Llama-3.2-3B", bf16: mlx-community/Llama-3.2-3B-Instruct-bf16, int4: mlx-community/Llama-3.2-3B-Instruct-4bit }
    - { label: "Qwen2.5-1.5B", bf16: mlx-community/Qwen2.5-1.5B-Instruct-bf16, int4: mlx-community/Qwen2.5-1.5B-Instruct-4bit }
