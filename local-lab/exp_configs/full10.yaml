# FULL-10 — optimization sweeps across all 10 eval models.
# Hardware reality on a 24GB machine:
#   * bf16 weights only fit for <=3.8B models  -> bf16 listed only for the small ones.
#   * int8 + int4 fit for every model.
#   * speculative decoding needs a same-family draft -> only 7 of 10 have one
#     (Mistral-7B, Phi-3.5-mini, Gemma-2-2B have no smaller sibling).
# Missing precisions / missing drafts are skipped gracefully (see experiments.py).
mode: full
max_tokens: 200
reps: 5
target_for_detail: "Qwen2.5-3B"

# ---- per-model: speculative (where draft exists), batching, analytical KV-cache + fidelity ----
models:
  - { label: "Qwen2.5-3B",       model: mlx-community/Qwen2.5-3B-Instruct-4bit,        draft: mlx-community/Qwen2.5-0.5B-Instruct-4bit,      draft_name: "Qwen 0.5B",  params_b: 3 }
  - { label: "Qwen2.5-1.5B",     model: mlx-community/Qwen2.5-1.5B-Instruct-4bit,      draft: mlx-community/Qwen2.5-0.5B-Instruct-4bit,      draft_name: "Qwen 0.5B",  params_b: 1.5 }
  - { label: "Qwen2.5-7B",       model: mlx-community/Qwen2.5-7B-Instruct-4bit,        draft: mlx-community/Qwen2.5-0.5B-Instruct-4bit,      draft_name: "Qwen 0.5B",  params_b: 7 }
  - { label: "Qwen2.5-Coder-7B", model: mlx-community/Qwen2.5-Coder-7B-Instruct-4bit,  draft: mlx-community/Qwen2.5-Coder-1.5B-Instruct-4bit, draft_name: "Coder 1.5B", params_b: 7 }
  - { label: "Llama-3.2-3B",     model: mlx-community/Llama-3.2-3B-Instruct-4bit,      draft: mlx-community/Llama-3.2-1B-Instruct-4bit,      draft_name: "Llama 1B",   params_b: 3 }
  - { label: "Llama-3.1-8B",     model: mlx-community/Meta-Llama-3.1-8B-Instruct-4bit, draft: mlx-community/Llama-3.2-1B-Instruct-4bit,      draft_name: "Llama 1B",   params_b: 8 }
  - { label: "Gemma-2-9B",       model: mlx-community/gemma-2-9b-it-4bit,              draft: mlx-community/gemma-2-2b-it-4bit,              draft_name: "Gemma 2B",   params_b: 9 }
  - { label: "Gemma-2-2B",       model: mlx-community/gemma-2-2b-it-4bit,                                                                                            params_b: 2 }
  - { label: "Mistral-7B",       model: mlx-community/Mistral-7B-Instruct-v0.3-4bit,                                                                                 params_b: 7 }
  - { label: "Phi-3.5-mini",     model: mlx-community/Phi-3.5-mini-instruct-4bit,                                                                                    params_b: 3.8 }

spec:
  k_sweep: [2, 4, 6, 8]
  drafts_for_detail:
    - { name: "0.5B", model: mlx-community/Qwen2.5-0.5B-Instruct-4bit }
    - { name: "1.5B", model: mlx-community/Qwen2.5-1.5B-Instruct-4bit }

batch:
  max_tokens: 64
  sizes: [1, 2, 4, 8, 16, 32]

kv:
  contexts_tokens: [2000, 4000, 8000, 16000, 32000, 64000, 128000]
  fidelity_repeat: 150

# ---- combination ladder: needs bf16 baseline -> small models with a draft only ----
combos:
  models:
    - { label: "Qwen2.5-3B",   bf16: mlx-community/Qwen2.5-3B-Instruct-bf16,   int8: mlx-community/Qwen2.5-3B-Instruct-8bit,   int4: mlx-community/Qwen2.5-3B-Instruct-4bit,   draft: mlx-community/Qwen2.5-0.5B-Instruct-4bit }
    - { label: "Llama-3.2-3B", bf16: mlx-community/Llama-3.2-3B-Instruct-bf16, int8: mlx-community/Llama-3.2-3B-Instruct-8bit, int4: mlx-community/Llama-3.2-3B-Instruct-4bit, draft: mlx-community/Llama-3.2-1B-Instruct-4bit }
    - { label: "Qwen2.5-1.5B", bf16: mlx-community/Qwen2.5-1.5B-Instruct-bf16, int8: mlx-community/Qwen2.5-1.5B-Instruct-8bit, int4: mlx-community/Qwen2.5-1.5B-Instruct-4bit, draft: mlx-community/Qwen2.5-0.5B-Instruct-4bit }
  stacks:
    - { precision: bf16, kv: "off", spec: false, label: "No optimization (bf16)" }
    - { precision: int8, kv: "off", spec: false, label: "Quantized to 8-bit" }
    - { precision: int4, kv: "off", spec: false, label: "Quantized to 4-bit" }
    - { precision: int4, kv: 4,   spec: false, label: "+ KV-cache quant" }
    - { precision: int4, kv: "off", spec: true,  label: "+ Speculative" }
    - { precision: int4, kv: 4,   spec: true,  label: "+ KV + Speculative (all)" }

# ---- quantization per model: bf16 (<=3.8B only) / 8-bit / 4-bit -> speed, memory, perplexity ----
quant:
  models:
    - { label: "Qwen2.5-3B",       bf16: mlx-community/Qwen2.5-3B-Instruct-bf16,   int8: mlx-community/Qwen2.5-3B-Instruct-8bit,            int4: mlx-community/Qwen2.5-3B-Instruct-4bit }
    - { label: "Qwen2.5-1.5B",     bf16: mlx-community/Qwen2.5-1.5B-Instruct-bf16, int8: mlx-community/Qwen2.5-1.5B-Instruct-8bit,          int4: mlx-community/Qwen2.5-1.5B-Instruct-4bit }
    - { label: "Llama-3.2-3B",     bf16: mlx-community/Llama-3.2-3B-Instruct-bf16, int8: mlx-community/Llama-3.2-3B-Instruct-8bit,          int4: mlx-community/Llama-3.2-3B-Instruct-4bit }
    - { label: "Gemma-2-2B",       bf16: mlx-community/gemma-2-2b-it-bf16,         int8: mlx-community/gemma-2-2b-it-8bit,                  int4: mlx-community/gemma-2-2b-it-4bit }
    - { label: "Phi-3.5-mini",     bf16: mlx-community/Phi-3.5-mini-instruct-bf16, int8: mlx-community/Phi-3.5-mini-instruct-8bit,          int4: mlx-community/Phi-3.5-mini-instruct-4bit }
    - { label: "Qwen2.5-7B",                                                       int8: mlx-community/Qwen2.5-7B-Instruct-8bit,            int4: mlx-community/Qwen2.5-7B-Instruct-4bit }
    - { label: "Qwen2.5-Coder-7B",                                                 int8: mlx-community/Qwen2.5-Coder-7B-Instruct-8bit,      int4: mlx-community/Qwen2.5-Coder-7B-Instruct-4bit }
    - { label: "Llama-3.1-8B",                                                     int8: mlx-community/Meta-Llama-3.1-8B-Instruct-8bit,     int4: mlx-community/Meta-Llama-3.1-8B-Instruct-4bit }
    - { label: "Gemma-2-9B",                                                       int8: mlx-community/gemma-2-9b-it-8bit,                  int4: mlx-community/gemma-2-9b-it-4bit }
    - { label: "Mistral-7B",                                                       int8: mlx-community/Mistral-7B-Instruct-v0.3-8bit,       int4: mlx-community/Mistral-7B-Instruct-v0.3-4bit }
