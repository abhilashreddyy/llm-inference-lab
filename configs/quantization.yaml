# STUDY 1 — Quantization trade-off (speed x memory x QUALITY).
# Same model (Qwen2.5-7B) at three precisions; perplexity makes the quality axis real.
workload:
  num_requests: 12
  concurrency: 1
  max_output_tokens: 128
  prompts:
    - "Explain how a transformer neural network works, step by step."
    - "Write a Python function that returns the nth Fibonacci number, with comments."
    - "Summarize the causes of the 2008 financial crisis in one paragraph."
    - "What are the trade-offs between latency and throughput in LLM serving?"
cost:
  price_per_hour: null

runs:
  - label: "Qwen2.5-7B · bf16"
    engine: mlx
    model: mlx-community/Qwen2.5-7B-Instruct-bf16
    quant: bf16
    study: quantization
    params: { precision: bf16, bits: 16 }
    measure_quality: true

  - label: "Qwen2.5-7B · 8-bit"
    engine: mlx
    model: mlx-community/Qwen2.5-7B-Instruct-8bit
    quant: int8
    study: quantization
    params: { precision: int8, bits: 8 }
    measure_quality: true

  - label: "Qwen2.5-7B · 4-bit"
    engine: mlx
    model: mlx-community/Qwen2.5-7B-Instruct-4bit
    quant: int4
    study: quantization
    params: { precision: int4, bits: 4 }
    measure_quality: true
