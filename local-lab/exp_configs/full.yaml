# FULL — more models, more reps, finer sweeps. Run when finalized.
mode: full
max_tokens: 200
reps: 5
target_for_detail: "Qwen2.5-3B"

models:
  - { label: "Qwen2.5-3B",  model: mlx-community/Qwen2.5-3B-Instruct-4bit,  draft: mlx-community/Qwen2.5-0.5B-Instruct-4bit, draft_name: "Qwen 0.5B", params_b: 3 }
  - { label: "Llama-3.2-3B", model: mlx-community/Llama-3.2-3B-Instruct-4bit, draft: mlx-community/Llama-3.2-1B-Instruct-4bit, draft_name: "Llama 1B", params_b: 3 }
  - { label: "Qwen2.5-1.5B", model: mlx-community/Qwen2.5-1.5B-Instruct-4bit, draft: mlx-community/Qwen2.5-0.5B-Instruct-4bit, draft_name: "Qwen 0.5B", params_b: 1.5 }
  - { label: "Qwen2.5-Coder-3B", model: mlx-community/Qwen2.5-Coder-3B-Instruct-4bit, draft: mlx-community/Qwen2.5-Coder-1.5B-Instruct-4bit, draft_name: "Coder 1.5B", params_b: 3 }

spec:
  k_sweep: [2, 4, 6, 8]
  drafts_for_detail:
    - { name: "0.5B", model: mlx-community/Qwen2.5-0.5B-Instruct-4bit }
    - { name: "1.5B", model: mlx-community/Qwen2.5-1.5B-Instruct-4bit }

batch:
  max_tokens: 64
  sizes: [1, 2, 4, 8, 16, 32]

combos:
  models:
    - { label: "Qwen2.5-3B",  bf16: mlx-community/Qwen2.5-3B-Instruct-bf16,   int8: mlx-community/Qwen2.5-3B-Instruct-8bit,   int4: mlx-community/Qwen2.5-3B-Instruct-4bit,   draft: mlx-community/Qwen2.5-0.5B-Instruct-4bit }
    - { label: "Llama-3.2-3B", bf16: mlx-community/Llama-3.2-3B-Instruct-bf16, int8: mlx-community/Llama-3.2-3B-Instruct-8bit, int4: mlx-community/Llama-3.2-3B-Instruct-4bit, draft: mlx-community/Llama-3.2-1B-Instruct-4bit }
    - { label: "Qwen2.5-1.5B", bf16: mlx-community/Qwen2.5-1.5B-Instruct-bf16, int8: mlx-community/Qwen2.5-1.5B-Instruct-8bit, int4: mlx-community/Qwen2.5-1.5B-Instruct-4bit, draft: mlx-community/Qwen2.5-0.5B-Instruct-4bit }
  stacks:
    - { precision: bf16, kv: "off", spec: false, label: "No optimization (bf16)" }
    - { precision: int8, kv: "off", spec: false, label: "Quantized to 8-bit" }
    - { precision: int4, kv: "off", spec: false, label: "Quantized to 4-bit" }
    - { precision: int4, kv: 4,   spec: false, label: "+ KV-cache quant" }
    - { precision: int4, kv: "off", spec: true,  label: "+ Speculative" }
    - { precision: int4, kv: 4,   spec: true,  label: "+ KV + Speculative (all)" }

kv:
  contexts_tokens: [2000, 4000, 8000, 16000, 32000, 64000, 128000]
  fidelity_repeat: 150

# quantization per model — bf16 / 8-bit / 4-bit speed, memory, perplexity
quant:
  models:
    - { label: "Qwen2.5-3B",  bf16: mlx-community/Qwen2.5-3B-Instruct-bf16,  int8: mlx-community/Qwen2.5-3B-Instruct-8bit,  int4: mlx-community/Qwen2.5-3B-Instruct-4bit }
    - { label: "Llama-3.2-3B", bf16: mlx-community/Llama-3.2-3B-Instruct-bf16, int8: mlx-community/Llama-3.2-3B-Instruct-8bit, int4: mlx-community/Llama-3.2-3B-Instruct-4bit }
    - { label: "Qwen2.5-1.5B", bf16: mlx-community/Qwen2.5-1.5B-Instruct-bf16, int8: mlx-community/Qwen2.5-1.5B-Instruct-8bit, int4: mlx-community/Qwen2.5-1.5B-Instruct-4bit }
    - { label: "Qwen2.5-Coder-3B", bf16: mlx-community/Qwen2.5-Coder-3B-Instruct-bf16, int8: mlx-community/Qwen2.5-Coder-3B-Instruct-8bit, int4: mlx-community/Qwen2.5-Coder-3B-Instruct-4bit }
